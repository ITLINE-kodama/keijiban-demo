<script>
const ITER=600000, SK='tdbprev_pw';
function b64ToBytes(b64){const bin=atob(b64);const o=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)o[i]=bin.charCodeAt(i);return o;}
async function decrypt(pw){
  const enc=document.getElementById('payload').textContent.trim();
  const data=b64ToBytes(enc);
  const salt=data.slice(0,16),iv=data.slice(16,28),ct=data.slice(28);
  const e=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',e.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
function showGate(){document.getElementById('gate').style.display='block';
  const pi=document.getElementById('p');if(pi)pi.focus();}
document.getElementById('f').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const pw=document.getElementById('p').value;
  const errEl=document.getElementById('err'),loadEl=document.getElementById('loading'),btn=document.getElementById('b');
  btn.disabled=true;errEl.textContent='';loadEl.textContent='復号しています...';
  try{
    const html=await decrypt(pw);
    try{sessionStorage.setItem(SK,pw);}catch(_){}
    render(html);
  }catch(err){
    errEl.textContent='パスワードが正しくありません。';loadEl.textContent='';btn.disabled=false;
    const pi=document.getElementById('p');pi.value='';pi.focus();
  }
});
(async function(){
  let pw=null;try{pw=sessionStorage.getItem(SK);}catch(_){}
  if(pw){
    try{const html=await decrypt(pw);render(html);return;}
    catch(_){try{sessionStorage.removeItem(SK);}catch(__){}}
  }
  showGate();
})();
</script>
